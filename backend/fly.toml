# fly.toml app configuration file generated for kurdbox-backend on 2026-06-25T20:02:49+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kurdbox-backend'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = 'immediate'

[env]
  PORT = '5001'

[[services]]
  protocol = 'tcp'
  internal_port = 5001

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
